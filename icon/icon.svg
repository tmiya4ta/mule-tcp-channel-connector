<svg width="58" height="58" viewBox="0 0 58 58" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- background disc -->
  <circle cx="29" cy="29" r="29" fill="#0F7B86"/>

  <!-- left terminal -->
  <rect x="5" y="23" width="7" height="12" rx="1.5" fill="#FFFFFF"/>
  <!-- right terminal -->
  <rect x="46" y="23" width="7" height="12" rx="1.5" fill="#FFFFFF"/>

  <!-- persistent channel (thin pipe) -->
  <line x1="12" y1="29" x2="46" y2="29" stroke="#FFFFFF" stroke-width="1.2" opacity="0.35"/>

  <!-- three frames in transit -->
  <rect x="15.5" y="25.5" width="6.5" height="7" rx="1" fill="#FFFFFF"/>
  <rect x="25.75" y="25.5" width="6.5" height="7" rx="1" fill="#FFFFFF"/>
  <rect x="36" y="25.5" width="6.5" height="7" rx="1" fill="#FFFFFF"/>

  <!-- bidirectional arrows above and below the channel -->
  <path d="M 18 16 L 40 16" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <path d="M 37.5 13.8 L 40 16 L 37.5 18.2" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>

  <path d="M 40 42 L 18 42" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" opacity="0.85"/>
  <path d="M 20.5 39.8 L 18 42 L 20.5 44.2" stroke="#FFFFFF" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.85"/>
</svg>
